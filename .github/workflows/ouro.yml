name: OuroLang CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Compile VM Kernel
      run: |
        mkdir -p bin build
        gcc -o bin/ouro_vm src/vm/ouro_vm.c -Wall -O2
        ls -la bin/ouro_vm
    
    - name: Test VM langsung (tanpa compiler)
      run: |
        echo 'CETAK_TEKS "Halo CI!"' > input.ouro
        echo 'BATAS_PROGRAM' >> input.ouro
        ./bin/ouro_vm stable/ouroc.obf 2>/dev/null || echo "Need compiler"
        ./bin/ouro_vm output.obf 2>/dev/null | grep "Halo" && echo "TEST OK" || echo "TEST FAIL"
    
    - name: Done
      run: echo "CI Selesai"
