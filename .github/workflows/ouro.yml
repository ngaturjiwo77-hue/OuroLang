name: OuroLang CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify OuroLang
      run: |
        echo "╔══════════════════════════════════════╗"
        echo "║        OUROLANG CI                  ║"
        echo "╠══════════════════════════════════════╣"
        echo "║ Pustaka: $(ls lib/ | wc -l) modul"
        echo "║ Apps:    $(ls apps/ | wc -l) file"
        echo "║ Native:  $(ls native/*.asm 2>/dev/null | wc -l) asm"
        echo "║ Status:  ✅ OK"
        echo "╚══════════════════════════════════════╝"
